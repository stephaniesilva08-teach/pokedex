<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller 3</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section>
        <div id="container">
            <label for="pokemons" id="elegir">ELIGE TU POKEMON</label>
            <select id="pokemons" onchange="pokemonSelected(this.value)">
                <option value="">Select a Pokemon</option>
            </select>
        </div>

        <div id="pokemon-info">
            <h1 id="pokemon-name"></h1>
            <img id="pokemon-image"></img>
            <h3 id="titulo-type"></h3>
            <ul id="pokemon-type"></ul>
            <h3 id="titulo-info"></h3>
            <ul id="pokemon-stats"></ul>
            <h3 id="title-abilities"></h3>
            <ul id="pokemon-abs"></ul>
        </div>
    </section>
</body>

</html>
